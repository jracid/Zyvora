<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a;
    --bg2:#111111;
    --bg3:#181818;
    --card:#1a1a1a;
    --line:rgba(255,255,255,0.07);
    --gold:#f5c518;
    --gold2:#e6a800;
    --gold3:#ffd84d;
    --gold-dim:rgba(245,197,24,0.15);
    --gold-glow:rgba(245,197,24,0.25);
    --text:#ffffff;
    --text-dim:#aaaaaa;
    --text-faint:#555555;
    --radius:10px;
    --shadow:0 8px 32px rgba(0,0,0,0.7);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  html{overflow-x:hidden;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  img{max-width:100%;display:block;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;border:none;cursor:pointer;}
  ::selection{background:var(--gold);color:#000;}
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--gold2);border-radius:4px;}

  /* ── TOPBAR ── */
  .topbar{
    position:fixed;top:0;left:0;right:0;z-index:40;
    background:linear-gradient(to bottom, rgba(10,10,10,0.85) 0%, rgba(10,10,10,0.4) 60%, transparent 100%);
    transition:background .3s ease;
  }
  .topbar.scrolled{
    background:rgba(10,10,10,0.95);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  .topbar-inner{
    max-width:1400px;margin:0 auto;
    display:flex;align-items:center;gap:18px;
    padding:14px 24px;
    width:100%;
  }
  .brand{
    display:flex;align-items:center;gap:10px;
    flex-shrink:0;
  }
  .brand-z{
    width:36px;height:36px;
    background:var(--gold);
    clip-path:polygon(0 0,100% 0,100% 18%,28% 18%,100% 82%,100% 100%,0 100%,0 82%,72% 82%,0 18%);
    flex-shrink:0;
  }
  .brand-name{
    font-family:'Bebas Neue',sans-serif;
    font-size:26px;letter-spacing:3px;
    color:var(--gold);line-height:1;
  }
  .topbar-spacer{flex:1;}
  .icon-btn{
    width:38px;height:38px;border-radius:50%;
    background:rgba(255,255,255,0.06);
    border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    color:var(--text);cursor:pointer;flex-shrink:0;
    transition:all .15s;
  }
  .icon-btn:hover{background:var(--gold);border-color:var(--gold);color:#000;}
  .icon-btn svg{width:17px;height:17px;stroke:currentColor;}

  /* expanding search */
  .search-box{
    position:relative;display:flex;align-items:center;
    width:38px;flex-shrink:0;
    transition:width .25s ease;
    background:rgba(255,255,255,0.06);
    border:1px solid var(--line);
    border-radius:19px;overflow:hidden;
  }
  .search-box.open{width:min(240px, 50vw);border-color:var(--gold);background:var(--bg3);}
  .search-box .icon-btn{
    background:transparent;border:none;position:relative;z-index:2;
  }
  .search-box.open .icon-btn{color:var(--gold);}
  .search-box input{
    position:absolute;left:38px;right:8px;
    width:calc(100% - 46px);
    background:transparent;border:none;outline:none;
    color:var(--text);font-size:14px;
    opacity:0;transition:opacity .15s;
    padding:0;
  }
  .search-box.open input{opacity:1;}
  .search-box input::placeholder{color:var(--text-faint);}

  .signin-btn{
    background:var(--gold);color:#000;
    font-size:13.5px;font-weight:700;
    padding:9px 20px;border-radius:20px;
    cursor:pointer;flex-shrink:0;white-space:nowrap;
    transition:all .15s;
  }
  .signin-btn:hover{background:var(--gold3);transform:translateY(-1px);}
  .user-chip{
    display:flex;align-items:center;gap:8px;
    background:rgba(255,255,255,0.06);
    border:1px solid var(--line);
    border-radius:20px;padding:5px 14px 5px 6px;
    cursor:pointer;flex-shrink:0;transition:all .15s;
    position:relative;
  }
  .user-chip:hover{border-color:var(--gold);}
  .user-avatar{
    width:26px;height:26px;border-radius:50%;
    background:var(--gold);color:#000;
    font-weight:800;font-size:12px;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;flex-shrink:0;
  }
  .user-avatar img{width:100%;height:100%;object-fit:cover;}
  .user-chip span{font-size:13px;font-weight:600;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .user-menu{
    position:absolute;top:calc(100% + 8px);right:0;
    background:var(--bg3);border:1px solid var(--line);
    border-radius:8px;min-width:160px;
    box-shadow:var(--shadow);overflow:hidden;
    opacity:0;pointer-events:none;transform:translateY(-6px);
    transition:all .15s;z-index:50;
  }
  .user-menu.open{opacity:1;pointer-events:auto;transform:translateY(0);}
  .user-menu button{
    width:100%;text-align:left;padding:11px 16px;
    background:transparent;color:var(--text-dim);font-size:13px;
    transition:all .12s;
  }
  .user-menu button:hover{background:rgba(245,197,24,0.08);color:var(--gold);}

  /* ── HERO ── */
  .hero{
    position:relative;min-height:72vh;
    display:flex;align-items:flex-end;
    overflow:hidden;
  }
  .hero-bg{
    position:absolute;inset:0;
    background-size:cover;background-position:center top;
    opacity:0;transition:opacity .7s ease;
  }
  .hero-bg.active{opacity:1;}
  .hero-overlay{
    position:absolute;inset:0;
    background:linear-gradient(to right, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.5) 55%, rgba(0,0,0,0.1) 100%),
               linear-gradient(to top, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
  }
  .hero-content{
    position:relative;z-index:2;
    max-width:1400px;margin:0 auto;width:100%;
    padding:0 24px 44px;
  }
  .hero-badge{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--gold);color:#000;
    font-size:10px;font-weight:800;letter-spacing:2px;
    padding:4px 12px;border-radius:4px;
    margin-bottom:14px;text-transform:uppercase;
  }
  .hero-title{
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(44px,7vw,90px);
    line-height:0.92;letter-spacing:1px;
    margin-bottom:16px;
    max-width:640px;
  }
  .hero-meta{
    display:flex;gap:16px;align-items:center;
    font-size:13px;color:var(--text-dim);
    margin-bottom:14px;flex-wrap:wrap;
  }
  .star{color:var(--gold);font-size:12px;}
  .hero-overview{
    color:var(--text-dim);font-size:14.5px;line-height:1.65;
    max-width:520px;margin-bottom:24px;
  }
  .btn-row{display:flex;gap:10px;}
  .btn{
    border-radius:6px;
    padding:11px 24px;font-size:14px;font-weight:700;
    cursor:pointer;transition:all .15s;
    display:inline-flex;align-items:center;gap:8px;
  }
  .btn-primary{
    background:var(--gold);color:#000;
    box-shadow:0 0 20px var(--gold-glow);
  }
  .btn-primary:hover{background:var(--gold3);transform:translateY(-1px);}
  .btn-ghost{
    background:rgba(255,255,255,0.06);color:var(--text);
    border:1px solid rgba(255,255,255,0.12);
  }
  .btn-ghost:hover{background:rgba(255,255,255,0.1);border-color:var(--gold);}

  /* hero dot nav */
  .hero-dots{
    display:flex;gap:6px;margin-top:22px;
  }
  .hero-dot{
    width:24px;height:3px;border-radius:2px;
    background:rgba(255,255,255,0.2);
    cursor:pointer;transition:all .2s;border:none;padding:0;
  }
  .hero-dot.active{width:40px;background:var(--gold);}

  /* ── GOLD DIVIDER ── */
  .gold-bar{
    height:3px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity:0.6;
  }

  /* ── BROWSE ── */
  .browse{
    max-width:1400px;margin:0 auto;
    padding:32px 24px 40px;
  }
  .browse-section{margin-bottom:38px;}
  .row-head{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:14px;
  }
  .row-title{
    font-family:'Bebas Neue',sans-serif;
    font-size:22px;letter-spacing:1.5px;color:var(--text);
  }
  .row-title span{color:var(--gold);}

  .genres{
    display:flex;gap:7px;flex-wrap:wrap;margin-bottom:28px;
  }
  .chip{
    background:var(--bg3);border:1px solid var(--line);
    color:var(--text-dim);border-radius:6px;
    padding:6px 15px;font-size:12.5px;cursor:pointer;
    transition:all .15s;font-weight:500;
  }
  .chip:hover{border-color:var(--gold);color:var(--text);}
  .chip.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700;}

  /* ── HORIZONTAL SCROLL ROW (single line, no wrap) ── */
  .h-scroll{
    display:flex;gap:12px;
    overflow-x:auto;
    overflow-y:hidden;
    padding-bottom:12px;
    scroll-snap-type:x mandatory;
    scrollbar-width:thin;
    flex-wrap:nowrap;
  }
  .h-scroll::-webkit-scrollbar{height:3px;}

  /* ── CARD ── */
  .card{
    flex:0 0 130px;
    scroll-snap-align:start;
    border-radius:8px;
    overflow:hidden;
    background:var(--card);
    border:1px solid var(--line);
    cursor:pointer;
    transition:transform .2s,box-shadow .2s,border-color .2s;
    position:relative;
  }
  .card:hover{
    transform:translateY(-4px) scale(1.02);
    box-shadow:0 12px 36px rgba(0,0,0,0.6),0 0 0 1px var(--gold2);
    border-color:var(--gold2);
    z-index:2;
  }
  .card-poster{
    position:relative;aspect-ratio:2/3;
    background:var(--bg3);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  .card-poster img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
  .card:hover .card-poster img{transform:scale(1.06);}
  .card-poster-fallback{
    font-family:'Bebas Neue',sans-serif;font-size:13px;
    text-align:center;color:var(--text-faint);padding:10px;line-height:1.3;
  }
  .card-rating{
    position:absolute;top:6px;right:6px;
    background:rgba(0,0,0,0.85);
    color:var(--gold);
    font-family:'JetBrains Mono',monospace;
    font-size:10px;font-weight:600;
    border-radius:4px;padding:2px 6px;
    border:1px solid rgba(245,197,24,0.3);
  }
  .card-play-overlay{
    position:absolute;inset:0;
    background:rgba(0,0,0,0.45);
    display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .2s;
  }
  .card:hover .card-play-overlay{opacity:1;}
  .card-play-icon{
    width:36px;height:36px;border-radius:50%;
    background:var(--gold);
    display:flex;align-items:center;justify-content:center;
  }
  .card-play-icon svg{width:14px;height:14px;fill:#000;margin-left:2px;}
  .card-body{padding:8px 9px 10px;}
  .card-title{
    font-size:12px;font-weight:600;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    margin-bottom:2px;
  }
  .card-year{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;color:var(--text-faint);
  }

  .state-msg{
    text-align:center;padding:50px 20px;color:var(--text-faint);
    font-family:'JetBrains Mono',monospace;font-size:13px;
  }

  /* ── DETAIL PANEL ── */
  .scrim{
    position:fixed;inset:0;background:rgba(0,0,0,0.8);
    z-index:60;opacity:0;pointer-events:none;
    transition:opacity .25s;backdrop-filter:blur(4px);
  }
  .scrim.open{opacity:1;pointer-events:auto;}
  .detail{
    position:fixed;top:0;right:0;bottom:0;
    width:min(580px,100vw);
    background:var(--bg2);
    z-index:61;
    overflow-y:auto;
    transform:translateX(100%);
    transition:transform .32s cubic-bezier(.4,0,.2,1);
    border-left:1px solid rgba(245,197,24,0.15);
  }
  .detail.open{transform:translateX(0);}
  .detail-close{
    position:absolute;top:16px;right:16px;z-index:5;
    width:34px;height:34px;border-radius:6px;
    background:rgba(255,255,255,0.06);border:1px solid var(--line);
    color:var(--text);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;transition:all .15s;
  }
  .detail-close:hover{background:var(--gold);color:#000;border-color:var(--gold);}
  .detail-hero{
    position:relative;height:260px;
    background-size:cover;background-position:center;
    background-color:var(--bg3);
  }
  .detail-hero-fade{
    position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(10,10,10,0.1) 20%, var(--bg2) 100%);
  }
  .detail-gold-line{
    height:2px;
    background:linear-gradient(90deg,var(--gold),var(--gold2),transparent);
  }
  .detail-body{padding:20px 26px 50px;}
  .detail-title{
    font-family:'Bebas Neue',sans-serif;
    font-size:34px;letter-spacing:1px;margin:0 0 10px;line-height:1;
  }
  .detail-meta{
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;
    font-size:12.5px;color:var(--text-dim);margin-bottom:16px;
  }
  .detail-meta .star{font-size:11px;}
  .d-tag{
    background:rgba(245,197,24,0.1);border:1px solid rgba(245,197,24,0.2);
    border-radius:4px;padding:2px 9px;font-size:11.5px;color:var(--gold2);
  }
  .detail-overview{
    font-size:13.5px;line-height:1.7;color:var(--text-dim);margin-bottom:24px;
  }
  .blk-label{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--gold);margin:0 0 10px;
    display:flex;align-items:center;gap:8px;
  }
  .blk-label::after{content:'';flex:1;height:1px;background:rgba(245,197,24,0.15);}

  .cast-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;margin-bottom:24px;scrollbar-width:none;}
  .cast-row::-webkit-scrollbar{display:none;}
  .cast-item{flex:0 0 62px;text-align:center;}
  .cast-photo{
    width:52px;height:52px;border-radius:50%;object-fit:cover;
    background:var(--bg3);margin:0 auto 5px;
    border:2px solid rgba(245,197,24,0.2);
  }
  .cast-name{font-size:10px;color:var(--text-dim);line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cast-char{font-size:9.5px;color:var(--text-faint);line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  /* embed */
  .embed-wrap{
    position:relative;width:100%;aspect-ratio:16/9;
    border-radius:8px;overflow:hidden;background:#000;
    border:1px solid rgba(245,197,24,0.2);
  }
  .embed-wrap iframe{width:100%;height:100%;border:0;}
  .embed-placeholder{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:12px;height:100%;min-height:160px;
    background:radial-gradient(ellipse at center, rgba(245,197,24,0.04) 0%, transparent 70%);
  }
  .embed-placeholder span{
    color:var(--text-faint);font-size:12px;font-family:'JetBrains Mono',monospace;
    letter-spacing:.5px;
  }
  .btn-play-embed{
    background:var(--gold);color:#000;
    border:none;border-radius:6px;
    padding:11px 22px;font-size:13.5px;font-weight:800;
    cursor:pointer;font-family:'Inter',sans-serif;
    transition:all .15s;
    display:inline-flex;align-items:center;gap:8px;
    box-shadow:0 0 24px var(--gold-glow);
  }
  .btn-play-embed:hover{background:var(--gold3);transform:scale(1.03);}

  /* ── BOTTOM NAV ── */
  .bottom-nav{
    position:fixed;left:0;right:0;bottom:0;z-index:45;
    background:rgba(10,10,10,0.97);
    backdrop-filter:blur(14px);
    border-top:1px solid var(--line);
    display:flex;justify-content:center;
  }
  .bottom-nav-inner{
    display:flex;align-items:center;justify-content:center;
    gap:64px;width:100%;max-width:500px;
    padding:9px 24px calc(9px + env(safe-area-inset-bottom));
  }
  .nav-item{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    color:var(--text-faint);cursor:pointer;
    font-size:11px;font-weight:600;
    transition:color .15s;background:transparent;
    flex:1;padding:4px 0;
  }
  .nav-item svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;transition:all .15s;}
  .nav-item.active{color:var(--gold);}
  .nav-item.active svg{fill:var(--gold-dim);}
  .nav-item:hover{color:var(--text);}
  body{padding-bottom:64px;}

  /* ── ADSENSE AD UNITS ── */
  .ad-unit{
    max-width:1400px;margin:0 auto;
    padding:12px 24px;
    text-align:center;
  }
  .ad-unit-label{
    font-family:'JetBrains Mono',monospace;
    font-size:9px;letter-spacing:2px;
    color:var(--text-faint);text-transform:uppercase;
    margin-bottom:4px;
  }
  .ad-unit ins{
    display:block;
    border-radius:6px;
    overflow:hidden;
  }

  /* ── POPUP ADS ── */
  .ad-popup-scrim{
    position:fixed;inset:0;z-index:200;
    background:rgba(0,0,0,0.65);
    display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;
    transition:opacity .3s ease;
    backdrop-filter:blur(3px);
  }
  .ad-popup-scrim.show{opacity:1;pointer-events:auto;}
  .ad-popup-box{
    position:relative;
    background:var(--bg2);
    border:1px solid rgba(245,197,24,0.25);
    border-radius:12px;
    padding:20px;
    max-width:360px;
    width:calc(100vw - 48px);
    box-shadow:0 24px 80px rgba(0,0,0,0.9), 0 0 0 1px rgba(245,197,24,0.1);
    animation:adPopIn .3s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes adPopIn{
    from{transform:scale(.88) translateY(20px);opacity:0;}
    to{transform:scale(1) translateY(0);opacity:1;}
  }
  .ad-popup-label{
    font-family:'JetBrains Mono',monospace;
    font-size:9px;letter-spacing:2px;text-transform:uppercase;
    color:var(--text-faint);margin-bottom:8px;
  }
  .ad-popup-close{
    position:absolute;top:10px;right:10px;
    width:28px;height:28px;border-radius:6px;
    background:rgba(255,255,255,0.06);
    border:1px solid var(--line);
    color:var(--text);font-size:14px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:all .15s;z-index:2;
  }
  .ad-popup-close:hover{background:var(--gold);color:#000;border-color:var(--gold);}
  .ad-popup-countdown{
    display:inline-block;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;color:var(--gold);
    background:rgba(245,197,24,0.1);
    border:1px solid rgba(245,197,24,0.2);
    border-radius:4px;padding:2px 8px;
    margin-bottom:10px;
  }
  .ad-popup-box ins{
    display:block;border-radius:6px;overflow:hidden;
  }

  /* ── AUTH MODAL ── */
  .auth-scrim{
    position:fixed;inset:0;background:rgba(0,0,0,0.75);
    z-index:80;opacity:0;pointer-events:none;
    transition:opacity .2s;backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;
    padding:20px;
  }
  .auth-scrim.open{opacity:1;pointer-events:auto;}
  .auth-card{
    width:100%;max-width:380px;
    background:var(--bg2);border:1px solid var(--line);
    border-radius:14px;padding:32px 28px 28px;
    position:relative;
    transform:translateY(14px) scale(.98);opacity:0;
    transition:all .25s cubic-bezier(.4,0,.2,1);
    box-shadow:var(--shadow);
  }
  .auth-scrim.open .auth-card{transform:translateY(0) scale(1);opacity:1;}
  .auth-close{
    position:absolute;top:14px;right:14px;
    width:30px;height:30px;border-radius:6px;
    background:rgba(255,255,255,0.06);border:1px solid var(--line);
    color:var(--text);cursor:pointer;font-size:15px;
    display:flex;align-items:center;justify-content:center;
    transition:all .15s;
  }
  .auth-close:hover{background:var(--gold);color:#000;border-color:var(--gold);}
  .auth-head{text-align:center;margin-bottom:22px;}
  .auth-head .brand-z{margin:0 auto 12px;}
  .auth-title{
    font-family:'Bebas Neue',sans-serif;font-size:26px;
    letter-spacing:1.5px;margin-bottom:4px;
  }
  .auth-sub{font-size:12.5px;color:var(--text-dim);}
  .auth-error{
    background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.3);
    color:#ff8080;font-size:12px;border-radius:6px;
    padding:9px 12px;margin-bottom:14px;display:none;
  }
  .auth-error.show{display:block;}
  .auth-field{margin-bottom:13px;}
  .auth-field label{
    display:block;font-size:11.5px;color:var(--text-dim);
    margin-bottom:6px;font-weight:600;
  }
  .auth-field input{
    width:100%;background:var(--bg3);
    border:1px solid var(--line);border-radius:7px;
    padding:11px 13px;color:var(--text);font-size:13.5px;
    outline:none;transition:border-color .2s,box-shadow .2s;
  }
  .auth-field input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim);}
  .auth-submit{
    width:100%;background:var(--gold);color:#000;
    border-radius:7px;padding:12px;font-size:14px;font-weight:800;
    cursor:pointer;margin-top:6px;transition:all .15s;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .auth-submit:hover{background:var(--gold3);}
  .auth-submit:disabled{opacity:.6;cursor:default;}
  .auth-divider{
    display:flex;align-items:center;gap:10px;
    margin:18px 0;color:var(--text-faint);font-size:11px;
    text-transform:uppercase;letter-spacing:1px;
  }
  .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--line);}
  .auth-google{
    width:100%;background:#fff;color:#1f1f1f;
    border-radius:7px;padding:11px;font-size:13.5px;font-weight:600;
    display:flex;align-items:center;justify-content:center;gap:10px;
    cursor:pointer;transition:all .15s;border:1px solid rgba(0,0,0,0.1);
  }
  .auth-google:hover{background:#f3f3f3;}
  .auth-google svg{width:17px;height:17px;}
  .auth-switch{
    text-align:center;margin-top:18px;font-size:12.5px;color:var(--text-dim);
  }
  .auth-switch button{color:var(--gold);font-weight:700;background:transparent;padding:0;}
  .auth-switch button:hover{color:var(--gold3);}

  @media(max-width:640px){
    .hero-title{font-size:44px;}
    .detail-body{padding:16px 18px 40px;}
    .card{flex:0 0 110px;}
    .topbar-inner{gap:10px;padding:12px 16px;}
    .signin-btn{padding:8px 14px;font-size:12.5px;}
    .bottom-nav-inner{gap:36px;}
    .auth-card{padding:26px 20px 22px;}
  }
</style>
</head>

<script>
(function(){
  "use strict";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAaeTuWBLAWghjPOknrRCShx6WnO3z65OQ",
  authDomain: "zyvora-e0129.firebaseapp.com",
  projectId: "zyvora-e0129",
  storageBucket: "zyvora-e0129.firebasestorage.app",
  messagingSenderId: "218833243706",
  appId: "1:218833243706:web:445b127e39f484ed696f03",
  measurementId: "G-RN36JQSELN"
};

  let fbApp = null, fbAuth = null, fbGoogleProvider = null, firebaseReady = false;
  let currentUser = null;

  function initFirebase(){
    return Promise.all([
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js")
    ]).then(([appMod, authMod]) => {
      fbApp = appMod.initializeApp(firebaseConfig);
      fbAuth = authMod.getAuth(fbApp);
      fbGoogleProvider = new authMod.GoogleAuthProvider();
      window._fbAuthMod = authMod;
      firebaseReady = true;
      authMod.onAuthStateChanged(fbAuth, user => { currentUser = user; renderAuthUI(user); });
    }).catch(err => {
      console.warn("Firebase init failed — auth UI will show but sign-in won't work until firebaseConfig is filled in.", err);
    });
  }

  /* ── DOM refs ── */
  const el = id => document.getElementById(id);
  const topbar = el("topbar");
  const searchBox = el("searchBox");
  const searchToggle = el("searchToggle");
  const searchInput = el("searchInput");
  const authSlot = el("authSlot");
  const signInBtn = el("signInBtn");

  const rowsView = el("rowsView");
  const searchView = el("searchView");
  const rowTrending = el("rowTrending");
  const rowPopular = el("rowPopular");
  const rowTopRated = el("rowTopRated");
  const searchGrid = el("searchGrid");
  const searchGridState = el("searchGridState");
  const searchTitle = el("searchTitle");
  const genreListEl = el("genreList");

  const navMovies = el("navMovies");
  const navTv = el("navTv");
  const navLiveTv = el("navLiveTv");

  const authScrim = el("authScrim");
  const authClose = el("authClose");
  const authForm = el("authForm");
  const authEmail = el("authEmail");
  const authPassword = el("authPassword");
  const authError = el("authError");
  const authSubmitBtn = el("authSubmitBtn");
  const authTitle = el("authTitle");
  const authSub = el("authSub");
  const authSwitch = el("authSwitch");
  const authToggleMode = el("authToggleMode");
  const googleSignInBtn = el("googleSignInBtn");

  /* ── TMDB ── */
  const API_KEY = "f7831b52d40b6337303e5173e3d206f7";
  const API = "https://api.themoviedb.org/3";
  const IMG = "https://image.tmdb.org/t/p";

  let mediaType = "movie"; // "movie" | "tv"
  let genresMap = { movie:{}, tv:{} };
  let activeGenre = null;
  let searchQuery = "";
  let searchPage = 1;
  let searchTotalPages = 1;

  function jsonFetch(path, params){
    const url = new URL(API + path);
    url.searchParams.set("api_key", API_KEY);
    Object.entries(params || {}).forEach(([k,v]) => url.searchParams.set(k,v));
    return fetch(url.toString()).then(r => {
      if(!r.ok) throw new Error("TMDB error: " + r.status);
      return r.json();
    });
  }
  function imgUrl(path, size){ return path ? IMG + "/" + size + path : null; }
  function titleOf(item){ return item.title || item.name || "Untitled"; }
  function dateOf(item){ return item.release_date || item.first_air_date || ""; }
  function yearOf(item){ const d = dateOf(item); return d ? d.slice(0,4) : "—"; }
  function truncate(s,n){ return s && s.length > n ? s.slice(0,n).trim() + "…" : (s||""); }
  function genreNames(ids){ return (ids||[]).map(id=>genresMap[mediaType][id]).filter(Boolean); }

  /* ════════════════════════════════════════════════
     TOPBAR: scroll state, search expand, nav
     ════════════════════════════════════════════════ */
  window.addEventListener("scroll", () => {
    topbar.classList.toggle("scrolled", window.scrollY > 30);
  }, { passive:true });

  searchToggle.addEventListener("click", () => {
    const isOpen = searchBox.classList.contains("open");
    if(isOpen && !searchInput.value){
      searchBox.classList.remove("open");
    } else {
      searchBox.classList.add("open");
      searchInput.focus();
    }
  });
  document.addEventListener("click", e => {
    if(!searchBox.contains(e.target) && !searchInput.value){
      searchBox.classList.remove("open");
    }
  });

  /* ════════════════════════════════════════════════
     GENRES (used in search view filter chips)
     ════════════════════════════════════════════════ */
  function loadGenres(type){
    return jsonFetch("/genre/" + type + "/list", {}).then(data => {
      genresMap[type] = {};
      (data.genres||[]).forEach(g => genresMap[type][g.id] = g.name);
      return data.genres || [];
    });
  }
  function renderGenreChips(genres){
    genreListEl.innerHTML = "";
    genreListEl.appendChild(makeChip("All", null, true));
    genres.slice(0,14).forEach(g => genreListEl.appendChild(makeChip(g.name, g.id, false)));
  }
  function makeChip(label, genreId, isActive){
    const btn = document.createElement("button");
    btn.className = "chip" + (isActive ? " active" : "");
    btn.textContent = label;
    btn.type = "button";
    btn.dataset.genreId = genreId === null ? "" : genreId;
    btn.addEventListener("click", () => {
      document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      btn.classList.add("active");
      activeGenre = genreId;
      searchPage = 1;
      fetchSearchGrid(false);
    });
    return btn;
  }

  /* ════════════════════════════════════════════════
     NETWORKS (used to build per-network browse rows)
     ════════════════════════════════════════════════ */
  const NETWORKS = [
    { id:'213',   label:'Netflix',    watchId:'8'   },
    { id:'49',    label:'HBO',        watchId:'1899' },
    { id:'2739',  label:'Disney+',    watchId:'337'  },
    { id:'2552',  label:'Apple TV+',  watchId:'350'  },
    { id:'1024',  label:'Amazon',     watchId:'9'    },
    { id:'453',   label:'Hulu',       watchId:'15'   },
    { id:'4330',  label:'Paramount+', watchId:'531'  },
    { id:'174',   label:'AMC',        watchId:'80'   },
    { id:'3353',  label:'Peacock',    watchId:'386'  },
    { id:'2087',  label:'Max',        watchId:'1899' }
  ];

  /* ════════════════════════════════════════════════
     ROWS (Trending / Popular / Top Rated / Upcoming / Networks)
     ════════════════════════════════════════════════ */
  function loadRows(){
    rowTrending.innerHTML = ""; rowPopular.innerHTML = ""; rowTopRated.innerHTML = "";
    el("rowUpcoming").innerHTML = "";
    el("rowUpcomingTitle").innerHTML = mediaType === "tv" ? "On The Air" : "Upcoming";

    const trendingP = jsonFetch("/trending/" + mediaType + "/week", {}).then(data => {
      (data.results || []).forEach(m => rowTrending.appendChild(makeCard(m)));
    });
    const popularP = jsonFetch("/" + mediaType + "/popular", { page:1 }).then(data => {
      (data.results || []).forEach(m => rowPopular.appendChild(makeCard(m)));
    });
    const topRatedP = jsonFetch("/" + mediaType + "/top_rated", { page:1 }).then(data => {
      (data.results || []).forEach(m => rowTopRated.appendChild(makeCard(m)));
    });
    const upcomingPath = mediaType === "tv" ? "/tv/on_the_air" : "/movie/upcoming";
    const upcomingP = jsonFetch(upcomingPath, { page:1 }).then(data => {
      (data.results || []).forEach(m => el("rowUpcoming").appendChild(makeCard(m)));
    });

    return Promise.all([trendingP, popularP, topRatedP, upcomingP])
      .catch(() => { rowTrending.innerHTML = '<div class="state-msg">Could not load. Try again.</div>'; })
      .finally(() => loadNetworkRows());
  }

  function loadNetworkRows(){
    const container = el("networkRows");
    container.innerHTML = "";
    NETWORKS.forEach(net => {
      const section = document.createElement("section");
      section.className = "browse-section";

      const head = document.createElement("div");
      head.className = "row-head";
      const h2 = document.createElement("h2");
      h2.className = "row-title";
      h2.innerHTML = net.label + ' <span>' + (mediaType === "tv" ? "Shows" : "Movies") + '</span>';
      head.appendChild(h2);
      section.appendChild(head);

      const scroll = document.createElement("div");
      scroll.className = "h-scroll";
      section.appendChild(scroll);
      container.appendChild(section);

      jsonFetch("/discover/" + mediaType, mediaType === "tv"
          ? { with_networks:net.id, sort_by:"popularity.desc", page:1 }
          : { with_watch_providers:net.watchId, watch_region:"US", sort_by:"popularity.desc", page:1 })
        .then(data => {
          const results = (data.results || []).slice(0,20);
          if(!results.length){ section.remove(); return; }
          results.forEach(m => scroll.appendChild(makeCard(m)));
        })
        .catch(() => { section.remove(); });
    });
  }

  /* ════════════════════════════════════════════════
     SEARCH GRID (wraps into a multi-row grid view)
     ════════════════════════════════════════════════ */
  function fetchSearchGrid(append){
    searchGridState.innerHTML = "";
    if(!append) searchGrid.innerHTML = "";

    let promise;
    if(searchQuery){
      promise = jsonFetch("/search/" + mediaType, { query:searchQuery, page:searchPage, include_adult:false });
      searchTitle.textContent = "\u201c" + searchQuery + "\u201d";
    } else if(activeGenre){
      promise = jsonFetch("/discover/" + mediaType, { with_genres:activeGenre, page:searchPage, sort_by:"popularity.desc" });
      searchTitle.textContent = "Browse";
    } else {
      promise = jsonFetch("/" + mediaType + "/popular", { page:searchPage });
      searchTitle.textContent = "Browse";
    }

    promise.then(data => {
      searchTotalPages = data.total_pages || 1;
      const results = data.results || [];
      if(!results.length && searchPage===1){
        searchGridState.innerHTML = '<div class="state-msg">No results found.</div>';
        return;
      }
      results.forEach(m => searchGrid.appendChild(makeCard(m)));
      if(searchPage < searchTotalPages){
        const wrap = document.createElement("div");
        wrap.style.width = "100%";
        wrap.style.textAlign = "center";
        wrap.style.marginTop = "8px";
        const btn = document.createElement("button");
        btn.className = "btn btn-ghost";
        btn.style.fontSize = "13px";
        btn.style.padding = "9px 24px";
        btn.textContent = "Load more";
        btn.type = "button";
        btn.addEventListener("click", () => { searchPage++; fetchSearchGrid(true); btn.parentElement.remove(); });
        wrap.appendChild(btn);
        searchGridState.appendChild(wrap);
      }
    }).catch(() => {
      searchGridState.innerHTML = '<div class="state-msg">Could not load. Try again.</div>';
    });
  }

  function showSearchView(){
    rowsView.style.display = "none";
    searchView.style.display = "block";
  }
  function showRowsView(){
    searchView.style.display = "none";
    rowsView.style.display = "block";
  }

  let searchTimer = null;
  searchInput.addEventListener("input", e => {
    clearTimeout(searchTimer);
    const v = e.target.value.trim();
    searchTimer = setTimeout(() => {
      searchQuery = v;
      activeGenre = null;
      searchPage = 1;
      document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      const allChip = document.querySelector('.chip[data-genre-id=""]');
      if(allChip) allChip.classList.add("active");

      if(searchQuery){
        showSearchView();
        fetchSearchGrid(false);
      } else {
        showRowsView();
      }
    }, 380);
  });

  /* ════════════════════════════════════════════════
     CARD
     ════════════════════════════════════════════════ */
  function makeCard(m){
    const card = document.createElement("div");
    card.className = "card";
    card.tabIndex = 0;
    card.setAttribute("role","button");
    card.setAttribute("aria-label","View " + titleOf(m));

    const posterWrap = document.createElement("div");
    posterWrap.className = "card-poster";

    const posterPath = imgUrl(m.poster_path,"w342");
    if(posterPath){
      const img = document.createElement("img");
      img.src = posterPath;
      img.alt = titleOf(m);
      img.loading = "lazy";
      posterWrap.appendChild(img);
    } else {
      const fb = document.createElement("div");
      fb.className = "card-poster-fallback";
      fb.textContent = titleOf(m);
      posterWrap.appendChild(fb);
    }

    const rating = document.createElement("div");
    rating.className = "card-rating";
    rating.textContent = "★ " + (m.vote_average ? m.vote_average.toFixed(1) : "—");
    posterWrap.appendChild(rating);

    const overlay = document.createElement("div");
    overlay.className = "card-play-overlay";
    overlay.innerHTML = '<div class="card-play-icon"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>';
    posterWrap.appendChild(overlay);

    const body = document.createElement("div");
    body.className = "card-body";
    const t = document.createElement("p");
    t.className = "card-title";
    t.textContent = titleOf(m);
    t.title = titleOf(m);
    const y = document.createElement("span");
    y.className = "card-year";
    y.textContent = yearOf(m);
    body.appendChild(t);
    body.appendChild(y);

    card.appendChild(posterWrap);
    card.appendChild(body);

    const open = () => openDetail(m.id);
    card.addEventListener("click", open);
    card.addEventListener("keydown", e => { if(e.key==="Enter"||e.key===" "){ e.preventDefault(); open(); } });
    return card;
  }

  /* ════════════════════════════════════════════════
     HERO
     ════════════════════════════════════════════════ */
  let heroMovies = [];
  let heroIndex = 0;
  let heroTimer = null;

  function loadHero(){
    return jsonFetch("/trending/" + mediaType + "/week",{}).then(data => {
      heroMovies = (data.results||[]).filter(m => m.backdrop_path).slice(0,6);
      el("heroBgLayer").innerHTML = "";
      if(!heroMovies.length) return;
      renderHeroDots();
      showHero(0);
      startHeroTimer();
    });
  }
  function startHeroTimer(){
    clearInterval(heroTimer);
    if(window.matchMedia("(prefers-reduced-motion:reduce)").matches) return;
    heroTimer = setInterval(() => showHero((heroIndex+1)%heroMovies.length), 7000);
  }
  function renderHeroDots(){
    const dots = el("heroDots");
    dots.innerHTML = "";
    heroMovies.forEach((_,i) => {
      const d = document.createElement("button");
      d.type = "button";
      d.className = "hero-dot" + (i===0?" active":"");
      d.addEventListener("click", () => { showHero(i); startHeroTimer(); });
      dots.appendChild(d);
    });
  }
  function showHero(index){
    heroIndex = index;
    const m = heroMovies[index];
    if(!m) return;

    const bgLayer = el("heroBgLayer");
    const layer = document.createElement("div");
    layer.className = "hero-bg";
    layer.style.backgroundImage = "url('" + imgUrl(m.backdrop_path,"original") + "')";
    bgLayer.appendChild(layer);
    requestAnimationFrame(() => layer.classList.add("active"));
    while(bgLayer.children.length > 2) bgLayer.removeChild(bgLayer.firstChild);

    el("heroTitle").textContent = titleOf(m);
    el("heroOverview").textContent = truncate(m.overview, 200);

    const meta = el("heroMeta");
    meta.innerHTML = "";
    const rSpan = document.createElement("span");
    rSpan.innerHTML = '<span class="star">★</span> ' + (m.vote_average ? m.vote_average.toFixed(1) : "—");
    meta.appendChild(rSpan);
    const ySpan = document.createElement("span");
    ySpan.textContent = yearOf(m);
    meta.appendChild(ySpan);
    const names = genreNames(m.genre_ids).slice(0,2);
    if(names.length){ const g = document.createElement("span"); g.textContent = names.join(" · "); meta.appendChild(g); }

    el("heroWatchBtn").onclick = () => openDetail(m.id, true);
    el("heroDetailsBtn").onclick = () => openDetail(m.id, false);

    document.querySelectorAll(".hero-dot").forEach((d,i) => d.classList.toggle("active", i===index));
  }

  /* ════════════════════════════════════════════════
     DETAIL PANEL
     ════════════════════════════════════════════════ */
  const scrim = el("scrim");
  const detail = el("detail");

  function openDetail(id, autoPlay){
    scrim.classList.add("open");
    detail.classList.add("open");
    document.body.style.overflow = "hidden";
    el("detailBody").innerHTML = '<div class="state-msg">Loading…</div>';
    el("detailHero").style.backgroundImage = "";

    jsonFetch("/" + mediaType + "/"+id, {append_to_response:"credits"}).then(m => {
      renderDetail(m, autoPlay);
    }).catch(() => {
      el("detailBody").innerHTML = '<div class="state-msg">Could not load this title.</div>';
    });
  }
  function closeDetail(){
    scrim.classList.remove("open");
    detail.classList.remove("open");
    document.body.style.overflow = "";
  }
  el("detailClose").addEventListener("click", closeDetail);
  scrim.addEventListener("click", closeDetail);
  document.addEventListener("keydown", e => { if(e.key==="Escape"){ closeDetail(); closeAuth(); } });

  function renderDetail(m, autoPlay){
    const backdrop = imgUrl(m.backdrop_path, "w1280");
    if(backdrop) el("detailHero").style.backgroundImage = "url('" + backdrop + "')";
    const body = el("detailBody");
    body.innerHTML = "";

    const h = document.createElement("h2");
    h.className = "detail-title";
    h.textContent = titleOf(m);
    body.appendChild(h);

    const meta = document.createElement("div");
    meta.className = "detail-meta";
    meta.innerHTML = '<span class="star">★</span> ' + (m.vote_average ? m.vote_average.toFixed(1) : "—");
    const ySpan = document.createElement("span");
    ySpan.textContent = yearOf(m);
    meta.appendChild(ySpan);
    const runtime = m.runtime || (m.episode_run_time && m.episode_run_time[0]);
    if(runtime){ const r = document.createElement("span"); r.textContent = runtime + " min"; meta.appendChild(r); }
    if(mediaType === "tv" && m.number_of_seasons){
      const s = document.createElement("span");
      s.textContent = m.number_of_seasons + " season" + (m.number_of_seasons>1?"s":"");
      meta.appendChild(s);
    }
    (m.genres||[]).slice(0,3).forEach(g => {
      const tag = document.createElement("span");
      tag.className = "d-tag";
      tag.textContent = g.name;
      meta.appendChild(tag);
    });
    body.appendChild(meta);

    const ov = document.createElement("p");
    ov.className = "detail-overview";
    ov.textContent = m.overview || "No synopsis available.";
    body.appendChild(ov);

    // Cast
    const cast = (m.credits && m.credits.cast) ? m.credits.cast.slice(0,12) : [];
    if(cast.length){
      const lbl = document.createElement("p");
      lbl.className = "blk-label";
      lbl.textContent = "Cast";
      body.appendChild(lbl);
      const row = document.createElement("div");
      row.className = "cast-row";
      cast.forEach(c => {
        const item = document.createElement("div");
        item.className = "cast-item";
        const photo = document.createElement("img");
        photo.className = "cast-photo";
        photo.src = imgUrl(c.profile_path,"w185") || "";
        photo.alt = c.name;
        photo.loading = "lazy";
        photo.onerror = function(){ this.style.visibility="hidden"; };
        const name = document.createElement("div");
        name.className = "cast-name";
        name.textContent = c.name;
        const ch = document.createElement("div");
        ch.className = "cast-char";
        ch.textContent = c.character || c.roles?.[0]?.character || "";
        item.appendChild(photo);
        item.appendChild(name);
        item.appendChild(ch);
        row.appendChild(item);
      });
      body.appendChild(row);
    }

    const watchLbl = document.createElement("p");
    watchLbl.className = "blk-label";
    watchLbl.textContent = "Watch Now";
    body.appendChild(watchLbl);

    const embedWrap = document.createElement("div");
    embedWrap.className = "embed-wrap";

    const placeholder = document.createElement("div");
    placeholder.className = "embed-placeholder";
    const pt = document.createElement("span");
    pt.textContent = "Stream via ";
    const playBtn = document.createElement("button");
    playBtn.type = "button";
    playBtn.className = "btn-play-embed";
    playBtn.innerHTML = mediaType === "tv" ? "▶ &nbsp;Play S1E1" : "▶ &nbsp;Play Movie";

    function startPlayback(){
      embedWrap.innerHTML = "";
      const iframe = document.createElement("iframe");
      iframe.src = mediaType === "tv"
  ? `https://vidsrc.to/embed/tv/${m.id}`
  : `https://vidsrc.to/embed/movie/${m.id}`;

      iframe.title = "Watch " + titleOf(m);
      iframe.allow = "autoplay; fullscreen; encrypted-media; picture-in-picture";
      iframe.allowFullscreen = true;
      embedWrap.appendChild(iframe);
    }

    playBtn.addEventListener("click", () => {
      if(!currentUser){
        pendingPlayAction = startPlayback;
        openAuth("signin", "Sign in to start watching.");
        return;
      }
      startPlayback();
    });
    placeholder.appendChild(pt);
    placeholder.appendChild(playBtn);
    embedWrap.appendChild(placeholder);
    body.appendChild(embedWrap);

    // Auto-play if triggered from Watch Now hero button
    if(autoPlay){
      requestAnimationFrame(() => { playBtn.click(); });
    }
  }

  /* ════════════════════════════════════════════════
     BOTTOM NAV — Movies / TV Shows toggle
     ════════════════════════════════════════════════ */
  function switchMediaType(type){
    if(mediaType === type) return;
    mediaType = type;
    navMovies.classList.toggle("active", type === "movie");
    navTv.classList.toggle("active", type === "tv");

    searchInput.value = "";
    searchQuery = "";
    activeGenre = null;
    searchPage = 1;
    showRowsView();

    el("heroTitle").textContent = "Loading…";
    el("heroMeta").innerHTML = "";
    el("heroOverview").textContent = "";

    Promise.all([
      loadGenres(mediaType).then(renderGenreChips),
      loadHero()
    ]).finally(() => loadRows());
  }
  navMovies.addEventListener("click", () => switchMediaType("movie"));
  navTv.addEventListener("click", () => switchMediaType("tv"));
  navLiveTv.addEventListener("click", () => {
    scrim.classList.add("open");
    detail.classList.add("open");
    document.body.style.overflow = "hidden";
    el("detailHero").style.backgroundImage = "";
    const body = el("detailBody");
    body.innerHTML = "";
    const h = document.createElement("h2");
    h.className = "detail-title";
    h.textContent = "Live TV";
    body.appendChild(h);
    const ov = document.createElement("p");
    ov.className = "detail-overview";
    ov.textContent = "Live TV channels are coming soon to Zyvora. Check back shortly!";
    body.appendChild(ov);
  });

  /* ════════════════════════════════════════════════
     AUTH (Firebase) — Email/Password + Google
     ════════════════════════════════════════════════ */
  let authMode = "signin"; // "signin" | "signup"
  let pendingPlayAction = null;

  function openAuth(mode, customSub){
    authMode = mode || "signin";
    updateAuthModeUI(customSub);
    authError.classList.remove("show");
    authError.textContent = "";
    authForm.reset();
    authScrim.classList.add("open");
  }
  function closeAuth(){ authScrim.classList.remove("open"); }
  function updateAuthModeUI(customSub){
    if(authMode === "signin"){
      authTitle.textContent = "Sign In";
      authSub.textContent = customSub || "Welcome back to Zyvora";
      authSubmitBtn.textContent = "Sign In";
      authSwitch.innerHTML = 'Don\u2019t have an account? <button type="button" id="authToggleMode">Sign Up</button>';
    } else {
      authTitle.textContent = "Create Account";
      authSub.textContent = customSub || "Join Zyvora to start watching";
      authSubmitBtn.textContent = "Sign Up";
      authSwitch.innerHTML = 'Already have an account? <button type="button" id="authToggleMode">Sign In</button>';
    }
    el("authToggleMode").addEventListener("click", () => openAuth(authMode === "signin" ? "signup" : "signin"));
  }

  signInBtn.addEventListener("click", () => openAuth("signin"));
  authClose.addEventListener("click", () => { pendingPlayAction = null; closeAuth(); });
  authScrim.addEventListener("click", e => { if(e.target === authScrim){ pendingPlayAction = null; closeAuth(); } });

  function setAuthError(msg){
    authError.textContent = msg;
    authError.classList.add("show");
  }
  function friendlyAuthError(err){
    const code = (err && err.code) || "";
    if(code.includes("user-not-found") || code.includes("invalid-credential") || code.includes("wrong-password")) return "Incorrect email or password.";
    if(code.includes("email-already-in-use")) return "An account with this email already exists.";
    if(code.includes("weak-password")) return "Password should be at least 6 characters.";
    if(code.includes("invalid-email")) return "Please enter a valid email address.";
    if(code.includes("popup-closed-by-user")) return "Sign-in popup was closed before completing.";
    if(code.includes("api-key") || code.includes("configuration-not-found") || !firebaseReady) return "Sign-in isn't configured yet — add your Firebase project keys to firebaseConfig.";
    return "Something went wrong. Please try again.";
  }

  function runPendingPlayAction(){
    if(pendingPlayAction){
      const action = pendingPlayAction;
      pendingPlayAction = null;
      requestAnimationFrame(action);
    }
  }

  authForm.addEventListener("submit", e => {
    e.preventDefault();
    authError.classList.remove("show");
    if(!firebaseReady){ setAuthError(friendlyAuthError()); return; }

    const email = authEmail.value.trim();
    const password = authPassword.value;
    authSubmitBtn.disabled = true;
    authSubmitBtn.textContent = "Please wait…";

    const mod = window._fbAuthMod;
    const action = authMode === "signin"
      ? mod.signInWithEmailAndPassword(fbAuth, email, password)
      : mod.createUserWithEmailAndPassword(fbAuth, email, password);

    action.then(() => { closeAuth(); runPendingPlayAction(); })
      .catch(err => setAuthError(friendlyAuthError(err)))
      .finally(() => {
        authSubmitBtn.disabled = false;
        updateAuthModeUI();
      });
  });

  googleSignInBtn.addEventListener("click", () => {
    authError.classList.remove("show");
    if(!firebaseReady){ setAuthError(friendlyAuthError()); return; }
    const mod = window._fbAuthMod;
    mod.signInWithPopup(fbAuth, fbGoogleProvider)
      .then(() => { closeAuth(); runPendingPlayAction(); })
      .catch(err => setAuthError(friendlyAuthError(err)));
  });

  function renderAuthUI(user){
    authSlot.innerHTML = "";
    if(user){
      const chip = document.createElement("div");
      chip.className = "user-chip";
      const avatar = document.createElement("div");
      avatar.className = "user-avatar";
      if(user.photoURL){
        const img = document.createElement("img");
        img.src = user.photoURL;
        img.alt = "";
        avatar.appendChild(img);
      } else {
        avatar.textContent = (user.displayName || user.email || "U").charAt(0).toUpperCase();
      }
      const name = document.createElement("span");
      name.textContent = user.displayName || user.email || "Account";
      chip.appendChild(avatar);
      chip.appendChild(name);

      const menu = document.createElement("div");
      menu.className = "user-menu";
      const signOutBtn = document.createElement("button");
      signOutBtn.type = "button";
      signOutBtn.textContent = "Sign Out";
      signOutBtn.addEventListener("click", e => {
        e.stopPropagation();
        window._fbAuthMod.signOut(fbAuth);
        menu.classList.remove("open");
      });
      menu.appendChild(signOutBtn);
      chip.appendChild(menu);

      chip.addEventListener("click", e => {
        e.stopPropagation();
        menu.classList.toggle("open");
      });
      document.addEventListener("click", () => menu.classList.remove("open"));

      authSlot.appendChild(chip);
    } else {
      const btn = document.createElement("button");
      btn.className = "signin-btn";
      btn.id = "signInBtn";
      btn.type = "button";
      btn.textContent = "Sign In";
      btn.addEventListener("click", () => openAuth("signin"));
      authSlot.appendChild(btn);
    }
  }

  /* ════════════════════════════════════════════════
     INIT
     ════════════════════════════════════════════════ */
  initFirebase();
  Promise.all([
    loadGenres("movie").then(renderGenreChips),
    loadHero()
  ]).finally(() => loadRows());

})();

</script>
</body>
</html>
